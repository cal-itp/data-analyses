metadata:
  version: 1
  
sources:
  geojson_districts:
    driver: geojson
    description: Districts per Caltrans. 
    args:
      urlpath: https://opendata.arcgis.com/datasets/e397d899e7be4ce28ad261867e61ac69_0.geojson
      use_fsspec: true

  TIRCP_processed:
    driver: csv
    description: Processed TIRCP. 
    args:
      urlpath: gs://calitp-analytics-data/data-analyses/tircp/data-analyses_tircp_Tableau_Sheet.csv
      
  Caltrans_District_Crosswalk:
    driver: csv
    description: Assign districts with counties.  
    args:
      urlpath: https://storage.cloud.google.com/calitp-analytics-data/data-analyses/tircp/Caltrans_District_County.csv